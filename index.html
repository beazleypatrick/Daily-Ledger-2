<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Ledger">
<meta name="theme-color" content="#14201B">
<title>The Daily Ledger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#14201B; --panel:#1C2B24; --panel-hi:#24362D; --line:#31463B;
    --ink:#EDE7D8; --ink-dim:#9DAF9F; --amber:#E8A33D; --amber-dim:#8A6B34;
    --green:#7FC97F; --red:#E06C5B;
    --mono:'SF Mono','JetBrains Mono',Menlo,monospace;
    --serif:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    --sans:'Avenir Next','Segoe UI',system-ui,sans-serif;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans);
    padding:calc(14px + env(safe-area-inset-top)) 14px calc(170px + env(safe-area-inset-bottom));
  }
  .wrap { max-width:640px; margin:0 auto; }
  header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px; }
  h1 { font-family:var(--serif); font-size:24px; font-weight:600; margin:0; letter-spacing:.01em; }
  .goal-tag { font-family:var(--mono); font-size:11.5px; color:var(--ink-dim); }

  .rail { display:flex; gap:8px; overflow-x:auto; padding:2px 2px 10px; scrollbar-width:none; }
  .rail::-webkit-scrollbar { display:none; }
  .day-card {
    flex:0 0 auto; width:76px; padding:10px 8px 8px; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; cursor:pointer; text-align:left;
    color:inherit; font-family:inherit;
  }
  .day-card.active { background:var(--panel-hi); border-color:var(--amber); }
  .day-card .d { font-family:var(--mono); font-size:11px; color:var(--ink-dim); letter-spacing:.04em; }
  .day-card.active .d { color:var(--amber); }
  .day-card .k { font-family:var(--mono); font-size:15px; font-weight:700; margin:3px 0 6px; }
  .day-card .bar { height:4px; background:var(--line); border-radius:2px; overflow:hidden; }
  .day-card .bar>div { height:100%; }

  .tabs { display:flex; gap:6px; margin:12px 0 16px; }
  .tab {
    padding:7px 20px; border-radius:9px; cursor:pointer; font-size:13.5px; font-weight:600;
    background:transparent; color:var(--ink-dim); border:1px solid var(--line); font-family:inherit;
  }
  .tab.active { background:var(--panel-hi); color:var(--ink); border-color:var(--amber); }

  .day-head { display:flex; justify-content:space-between; align-items:baseline; margin:6px 0 7px; }
  .day-title { font-family:var(--serif); font-size:20px; }
  .day-frac { font-family:var(--mono); font-size:13px; color:var(--ink-dim); }
  .progress { height:12px; background:var(--panel); border:1px solid var(--line); border-radius:7px; overflow:hidden; }
  .progress>div { height:100%; transition:width .4s; }
  .overflow-bar { height:6px; margin-top:3px; background:var(--panel); border-radius:4px; overflow:hidden; }
  .overflow-bar>div { height:100%; background:var(--red); }

  .chips { display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 16px; }
  .chip { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 14px; min-width:90px; flex:1 1 auto; }
  .chip .l { font-size:10.5px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:.09em; font-family:var(--mono); }
  .chip .v { font-family:var(--mono); font-size:19px; font-weight:700; margin-top:3px; }

  .meals { display:flex; flex-direction:column; gap:8px; }
  .meal {
    display:flex; justify-content:space-between; align-items:flex-start; gap:12px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:11px 14px;
  }
  .meal .n { font-size:14.5px; line-height:1.35; }
  .meal .note { color:var(--amber); font-size:11.5px; margin-top:3px; font-family:var(--mono); }
  .meal .k { font-family:var(--mono); font-size:15px; font-weight:700; white-space:nowrap; }
  .meal .del {
    background:none; border:none; color:var(--ink-dim); font-size:16px; cursor:pointer;
    padding:0 0 0 6px; line-height:1;
  }
  .empty { color:var(--ink-dim); font-style:italic; padding:18px 4px; font-family:var(--serif); }

  .win-btns { display:flex; gap:6px; margin-bottom:14px; }
  .win {
    padding:6px 14px; border-radius:8px; cursor:pointer; font-family:var(--mono);
    font-size:12.5px; font-weight:600; background:var(--panel); color:var(--ink-dim);
    border:1px solid var(--line);
  }
  .win.active { background:var(--amber); color:var(--bg); border-color:var(--amber); }
  .chart-box { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 10px 10px; margin-bottom:14px; }
  .chart-box .t { font-family:var(--serif); font-size:15.5px; margin:0 6px 10px; }
  .chart-box canvas { max-height:190px; }
  .chart-empty { color:var(--ink-dim); font-style:italic; font-family:var(--serif); font-size:14px; text-align:center; padding:40px 0; }

  .panel-box { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:14px; }
  .panel-box .t { font-family:var(--serif); font-size:15.5px; margin-bottom:8px; }
  .kv { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line); }
  .kv span { font-family:var(--mono); font-size:12px; }
  .kv .l { color:var(--ink-dim); }
  .btn {
    padding:7px 14px; border-radius:8px; cursor:pointer; font-family:var(--mono);
    font-size:12px; font-weight:600; background:var(--panel); color:var(--ink-dim);
    border:1px solid var(--line);
  }
  .btn.primary { background:var(--amber); color:var(--bg); border-color:var(--amber); }
  .btn.danger { color:var(--red); border-color:var(--red); }
  .btn-row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  textarea, input[type=password], input[type=text] {
    width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px;
    color:var(--ink); font-family:var(--mono); font-size:12px; padding:10px;
  }
  textarea { min-height:110px; resize:vertical; }
  pre.raw {
    font-family:var(--mono); font-size:11px; color:var(--ink-dim); white-space:pre-wrap;
    word-break:break-word; max-height:300px; overflow-y:auto; margin:0;
    background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:12px;
  }
  .hint { font-size:12px; color:var(--ink-dim); line-height:1.5; margin-top:8px; }

  .chatbar {
    position:fixed; left:0; right:0; bottom:0; padding:10px 14px calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 22%);
  }
  .chatbar .inner { max-width:640px; margin:0 auto; }
  .toast {
    background:var(--panel-hi); border:1px solid var(--line); border-radius:10px;
    padding:10px 14px; margin-bottom:8px; font-size:13px; line-height:1.45; display:none;
    position:relative; cursor:pointer;
  }
  .toast .x { position:absolute; top:6px; right:10px; color:var(--ink-dim); font-size:14px; }
  .opts { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .opt {
    padding:7px 13px; border-radius:16px; cursor:pointer; font-size:12.5px; font-weight:600;
    background:var(--panel); color:var(--amber); border:1px solid var(--amber-dim); font-family:inherit;
  }
  .opt:active { background:var(--amber); color:var(--bg); }
  .toast .status { font-family:var(--mono); font-size:11.5px; margin-top:6px; }
  .toast .status.ok { color:var(--green); }
  .toast .status.bad { color:var(--red); }
  .row { display:flex; gap:8px; }
  #chat-input {
    flex:1; padding:12px 16px; border-radius:12px; background:var(--panel);
    border:1px solid var(--line); color:var(--ink); font-size:16px; outline:none; font-family:var(--sans);
  }
  #chat-send {
    padding:0 20px; border-radius:12px; cursor:pointer; background:var(--amber);
    color:var(--bg); border:1px solid var(--amber); font-weight:700; font-size:14px;
  }
  #chat-send:disabled { background:var(--panel); color:var(--ink-dim); border-color:var(--line); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>The Daily Ledger</h1>
    <span class="goal-tag">goal <span id="goal-label"></span> kcal</span>
  </header>
  <div class="rail" id="rail"></div>
  <div class="tabs">
    <button class="tab active" data-tab="log">Log</button>
    <button class="tab" data-tab="trends">Trends</button>
    <button class="tab" data-tab="data">Data</button>
  </div>
  <div id="view-log"></div>
  <div id="view-trends" style="display:none"></div>
  <div id="view-data" style="display:none"></div>
</div>

<div class="chatbar">
  <div class="inner">
    <div class="toast" id="toast">
      <span class="x">✕</span>
      <div id="toast-reply"></div>
      <div class="opts" id="toast-opts"></div>
      <div class="status" id="toast-status"></div>
    </div>
    <div class="row">
      <input id="chat-input" placeholder="Tell the ledger what you ate…" autocomplete="off">
      <button id="chat-send">Log</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================ constants ============================ */
const DEFAULT_GOAL = 1900;
const LS_DIARY = "ledger-diary-v1";
const LS_KEY   = "ledger-api-key";
const LS_GOAL  = "ledger-goal";

/* No personal data ships in this file — every device starts blank
   and keeps its own private log in that browser's storage. */
const SEED_DIARY = {};

function getGoal() {
  const g = parseInt(localStorage.getItem(LS_GOAL), 10);
  return (g && g > 0) ? g : DEFAULT_GOAL;
}

/* ============================ state ============================ */
let diary = loadDiary();
let selected = pickDefaultDate();
let currentTab = "log";
let trendWin = 7;
let charts = [];

function todayISO() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function loadDiary() {
  try {
    const raw = localStorage.getItem(LS_DIARY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* fall through */ }
  return JSON.parse(JSON.stringify(SEED_DIARY));
}
function saveDiary() {
  const payload = JSON.stringify(diary);
  localStorage.setItem(LS_DIARY, payload);
  const check = localStorage.getItem(LS_DIARY);
  if (check !== payload) throw new Error("Read-back after save did not match.");
  return payload.length;
}
function pickDefaultDate() {
  const dates = Object.keys(diary).sort();
  return dates.includes(todayISO()) ? todayISO() : (dates[dates.length-1] || todayISO());
}
function ensureDay(d) {
  if (!diary[d]) diary[d] = { weightKg: null, bodyFatPct: null, meals: [], exercise: [] };
  if (!diary[d].exercise) diary[d].exercise = []; // older saved days
  return diary[d];
}
function dayTotal(d) { return (diary[d] ? diary[d].meals : []).reduce((s,m)=>s+(m.kcal||0),0); }
function dayBurn(d) { return ((diary[d] && diary[d].exercise) ? diary[d].exercise : []).reduce((s,m)=>s+(m.kcal||0),0); }
function dayNet(d) { return dayTotal(d) - dayBurn(d); }
function fmtDay(iso) { return new Date(iso+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function fmtShort(iso) { return new Date(iso+"T12:00:00").toLocaleDateString("en-US",{month:"numeric",day:"numeric"}); }
function fmtTime(d) { return d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}); }
function esc(s) { const div=document.createElement("div"); div.textContent=s; return div.innerHTML; }

/* ============================ rendering ============================ */
function render() {
  renderRail();
  if (currentTab === "log") renderLog();
  if (currentTab === "trends") renderTrends();
  if (currentTab === "data") renderData();
}

function renderRail() {
  const rail = document.getElementById("rail");
  const dates = Object.keys(diary).sort();
  rail.innerHTML = "";
  dates.forEach(d => {
    const total = dayNet(d);
    const over = total > getGoal();
    const pct = Math.min(total/getGoal(),1)*100;
    const btn = document.createElement("button");
    btn.className = "day-card" + (d===selected ? " active" : "");
    btn.innerHTML =
      '<div class="d">'+fmtShort(d)+'</div>' +
      '<div class="k">'+total.toLocaleString()+'</div>' +
      '<div class="bar"><div style="width:'+pct+'%;background:var(--'+(over?"red":"green")+')"></div></div>';
    btn.onclick = () => { selected = d; if (currentTab!=="log") switchTab("log"); render(); };
    rail.appendChild(btn);
  });
  const last = rail.lastElementChild;
  if (last && selected === dates[dates.length-1]) last.scrollIntoView({inline:"end"});
}

function renderLog() {
  const v = document.getElementById("view-log");
  const entry = diary[selected] || { meals: [], exercise: [] };
  const exercise = entry.exercise || [];
  const eaten = dayTotal(selected);
  const burned = dayBurn(selected);
  const net = eaten - burned;
  const remaining = getGoal() - net;
  const over = remaining < 0;
  const pct = Math.min(Math.max(net,0)/getGoal(),1)*100;
  const overflowPct = over ? Math.min(((net-getGoal())/getGoal())*100,100) : 0;

  let mealsHtml;
  if (!entry.meals || !entry.meals.length) {
    mealsHtml = '<div class="empty">Nothing logged yet. Type what you ate in the bar below.</div>';
  } else {
    mealsHtml = '<div class="meals">' + entry.meals.map((m,i) =>
      '<div class="meal"><div><div class="n">'+esc(m.name)+'</div>' +
      (m.note ? '<div class="note">'+esc(m.note)+'</div>' : '') +
      '</div><div style="display:flex;align-items:flex-start"><span class="k">'+m.kcal.toLocaleString()+'</span>' +
      '<button class="del" title="Remove" onclick="removeMeal(\''+selected+'\','+i+')">×</button></div></div>'
    ).join("") + '</div>';
  }

  let exHtml = "";
  if (exercise.length) {
    exHtml = '<div style="font-family:var(--serif);font-size:15.5px;margin:18px 0 8px">Exercise</div>' +
      '<div class="meals">' + exercise.map((m,i) =>
      '<div class="meal"><div><div class="n">'+esc(m.name)+'</div>' +
      (m.note ? '<div class="note">'+esc(m.note)+'</div>' : '') +
      '</div><div style="display:flex;align-items:flex-start"><span class="k" style="color:var(--green)">−'+m.kcal.toLocaleString()+'</span>' +
      '<button class="del" title="Remove" onclick="removeExercise(\''+selected+'\','+i+')">×</button></div></div>'
    ).join("") + '</div>';
  }

  v.innerHTML =
    '<div class="day-head"><span class="day-title">'+fmtDay(selected)+'</span>' +
    '<span class="day-frac">'+net.toLocaleString()+' net / '+getGoal().toLocaleString()+' kcal</span></div>' +
    '<div class="progress"><div style="width:'+(over?100:pct)+'%;background:var(--'+(over?"amber-dim":"green")+')"></div></div>' +
    (over ? '<div class="overflow-bar"><div style="width:'+overflowPct+'%"></div></div>' : '') +
    '<div class="chips">' +
      chip("Eaten", eaten.toLocaleString()) +
      chip("Burned", burned ? "−"+burned.toLocaleString() : "0", burned ? "var(--green)" : undefined) +
      chip(over?"Over by":"Available", Math.abs(remaining).toLocaleString(), over?"var(--red)":"var(--green)") +
      chip("Weight", entry.weightKg!=null ? entry.weightKg+" kg" : "—") +
      chip("Body fat", entry.bodyFatPct!=null ? entry.bodyFatPct+"%" : "—") +
    '</div>' + mealsHtml + exHtml;
}
function chip(l,v,tone) {
  return '<div class="chip"><div class="l">'+l+'</div><div class="v" style="color:'+(tone||"var(--ink)")+'">'+v+'</div></div>';
}

function removeMeal(date, i) {
  if (!confirm("Remove \"" + diary[date].meals[i].name + "\"?")) return;
  diary[date].meals.splice(i,1);
  try { saveDiary(); showToast(null, {ok:true, text:"Removed & saved."}); }
  catch(e) { showToast(null, {ok:false, text:"Removed on screen but SAVE FAILED: "+e.message}); }
  render();
}
function removeExercise(date, i) {
  if (!confirm("Remove \"" + diary[date].exercise[i].name + "\"?")) return;
  diary[date].exercise.splice(i,1);
  try { saveDiary(); showToast(null, {ok:true, text:"Removed & saved."}); }
  catch(e) { showToast(null, {ok:false, text:"Removed on screen but SAVE FAILED: "+e.message}); }
  render();
}

/* ---------------- trends ---------------- */
function renderTrends() {
  const v = document.getElementById("view-trends");
  charts.forEach(c=>c.destroy()); charts = [];
  v.innerHTML =
    '<div class="win-btns">' + [7,30,90].map(w =>
      '<button class="win'+(trendWin===w?" active":"")+'" onclick="setWin('+w+')">'+w+'d</button>').join("") + '</div>' +
    '<div class="chart-box"><div class="t">Calories vs. goal</div><canvas id="ch-kcal"></canvas></div>' +
    '<div class="chart-box"><div class="t">Weight (kg)</div><div id="ch-weight-wrap"><canvas id="ch-weight"></canvas></div></div>' +
    '<div class="chart-box"><div class="t">Body fat (%)</div><div id="ch-bf-wrap"><canvas id="ch-bf"></canvas></div></div>';

  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-trendWin);
  const rows = Object.keys(diary).sort()
    .filter(d => new Date(d+"T12:00:00") >= cutoff)
    .map(d => ({ day: fmtShort(d), kcal: dayNet(d), weight: diary[d].weightKg, bf: diary[d].bodyFatPct }));

  const css = getComputedStyle(document.documentElement);
  const C = n => css.getPropertyValue(n).trim();
  const gridOpts = { color: C("--line") };
  const tickOpts = { color: C("--ink-dim"), font: { family: "monospace", size: 10 } };

  charts.push(new Chart(document.getElementById("ch-kcal"), {
    type: "bar",
    data: { labels: rows.map(r=>r.day), datasets: [
      { data: rows.map(r=>r.kcal), backgroundColor: rows.map(r=>r.kcal>getGoal()?C("--red"):C("--green")), borderRadius: 5 },
      { type:"line", data: rows.map(()=>getGoal()), borderColor: C("--amber"), borderDash:[5,4], pointRadius:0, borderWidth:1.5 },
    ]},
    options: { plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:tickOpts}, y:{grid:gridOpts,ticks:tickOpts} } }
  }));

  lineChart("ch-weight","ch-weight-wrap", rows.filter(r=>r.weight!=null), "weight", C("--amber"), tickOpts, gridOpts, "No weigh-ins in this window yet.");
  lineChart("ch-bf","ch-bf-wrap", rows.filter(r=>r.bf!=null), "bf", C("--green"), tickOpts, gridOpts, "No body-fat readings yet.");
}
function lineChart(id, wrapId, rows, key, color, tickOpts, gridOpts, emptyMsg) {
  const wrap = document.getElementById(wrapId);
  if (!rows.length) { wrap.innerHTML = '<div class="chart-empty">'+emptyMsg+'</div>'; return; }
  charts.push(new Chart(document.getElementById(id), {
    type: "line",
    data: { labels: rows.map(r=>r.day), datasets: [{ data: rows.map(r=>r[key]), borderColor: color, backgroundColor: color, pointRadius: 4, borderWidth: 2.5, tension: .3 }]},
    options: { plugins:{legend:{display:false}}, scales:{ x:{grid:{display:false},ticks:tickOpts}, y:{grid:gridOpts,ticks:tickOpts} } }
  }));
}
function setWin(w){ trendWin = w; renderTrends(); }

/* ---------------- data tab ---------------- */
function renderData() {
  const v = document.getElementById("view-data");
  const raw = localStorage.getItem(LS_DIARY);
  const key = localStorage.getItem(LS_KEY) || "";
  let pretty = "— nothing stored yet —";
  if (raw) { try { pretty = JSON.stringify(JSON.parse(raw), null, 2); } catch(e){ pretty = "⚠ Stored data is not valid JSON:\n\n"+raw; } }

  v.innerHTML =
    '<div class="panel-box"><div class="t">Storage status</div>' +
      kv("Storage", raw ? "yes — "+raw.length.toLocaleString()+" bytes in this browser" : "empty", raw?"var(--green)":"var(--red)") +
      kv("Checked", fmtTime(new Date())) +
      '<div class="btn-row">' +
        '<button class="btn primary" onclick="renderData()">Re-check</button>' +
        '<button class="btn" onclick="copyBackup(this)">Copy JSON backup</button>' +
        '<button class="btn danger" onclick="eraseAll(this)">Erase all data</button>' +
      '</div>' +
      '<div class="hint">Data lives in this browser\u2019s localStorage. It survives closing the tab and restarting the phone, but clearing browser data erases it \u2014 take a JSON backup now and then.</div>' +
    '</div>' +
    '<div class="panel-box"><div class="t">Daily calorie goal</div>' +
      '<input type="text" inputmode="numeric" id="goal-input" value="'+getGoal()+'">' +
      '<div class="btn-row"><button class="btn primary" onclick="saveGoal()">Save goal</button></div>' +
    '</div>' +
    '<div class="panel-box"><div class="t">Claude API key</div>' +
      '<input type="password" id="api-key" placeholder="sk-ant-…" value="'+esc(key)+'">' +
      '<div class="btn-row"><button class="btn primary" onclick="saveKey()">Save key</button></div>' +
      '<div class="hint">With a key set, you can type food naturally and Claude estimates the calories. Without one, use the offline format: <b>food name = 350</b>, or <b>weight 72.5</b>, or <b>bf 18</b>. Get a key at console.anthropic.com. It\u2019s stored only in this browser \u2014 never put it in your GitHub repo.</div>' +
    '</div>' +
    '<div class="panel-box"><div class="t">Import backup</div>' +
      '<textarea id="import-box" placeholder="Paste a JSON backup here…"></textarea>' +
      '<div class="btn-row"><button class="btn danger" onclick="importBackup(this)">Import (overwrites current data)</button></div>' +
    '</div>' +
    '<div class="panel-box"><div class="t">Raw stored data</div><pre class="raw">'+esc(pretty)+'</pre></div>';
}
function kv(l,v,tone){ return '<div class="kv"><span class="l">'+l+'</span><span style="color:'+(tone||"var(--ink)")+'">'+v+'</span></div>'; }

function copyBackup(btn) {
  const raw = localStorage.getItem(LS_DIARY);
  if (!raw) return;
  navigator.clipboard.writeText(raw).then(()=>{ btn.textContent="Copied ✓"; })
    .catch(()=>{ alert("Clipboard unavailable — copy from the raw data box below."); });
}
function eraseAll(btn) {
  if (btn.dataset.armed !== "1") { btn.dataset.armed="1"; btn.textContent="Tap again to erase EVERYTHING"; return; }
  diary = {};
  ensureDay(todayISO());
  selected = todayISO();
  try { saveDiary(); showToast(null,{ok:true,text:"All data erased. Starting fresh."}); }
  catch(e){ showToast(null,{ok:false,text:"Erase SAVE FAILED: "+e.message}); }
  render();
}
function saveGoal() {
  const g = parseInt(document.getElementById("goal-input").value, 10);
  if (!g || g < 500 || g > 10000) { alert("Enter a goal between 500 and 10,000 kcal."); return; }
  localStorage.setItem(LS_GOAL, String(g));
  document.getElementById("goal-label").textContent = getGoal().toLocaleString();
  showToast(null,{ok:true,text:"Goal set to "+g.toLocaleString()+" kcal."});
  render();
}
function importBackup(btn) {
  const box = document.getElementById("import-box");
  let parsed;
  try { parsed = JSON.parse(box.value); } catch(e) { alert("That isn't valid JSON."); return; }
  if (typeof parsed !== "object" || Array.isArray(parsed)) { alert("Expected a diary object keyed by date."); return; }
  if (btn.dataset.armed !== "1") { btn.dataset.armed="1"; btn.textContent="Tap again to confirm overwrite"; return; }
  diary = parsed;
  selected = pickDefaultDate();
  try { saveDiary(); showToast(null,{ok:true,text:"Backup imported & saved."}); }
  catch(e){ showToast(null,{ok:false,text:"Import SAVE FAILED: "+e.message}); }
  render();
}
function saveKey() {
  const k = document.getElementById("api-key").value.trim();
  if (k) localStorage.setItem(LS_KEY, k); else localStorage.removeItem(LS_KEY);
  showToast(null,{ok:true,text: k ? "API key saved to this browser." : "API key cleared."});
}

/* ============================ tabs ============================ */
document.querySelectorAll(".tab").forEach(t => t.onclick = () => switchTab(t.dataset.tab));
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab===name));
  ["log","trends","data"].forEach(n => document.getElementById("view-"+n).style.display = n===name ? "" : "none");
  render();
}

/* ============================ chat / logging ============================ */
const input = document.getElementById("chat-input");
const sendBtn = document.getElementById("chat-send");
input.addEventListener("keydown", e => { if (e.key==="Enter") handleSend(); });
sendBtn.onclick = handleSend;

let toastTimer = null;
let pendingText = null; // original message awaiting a clarification answer

function showToast(reply, status, options) {
  const toast = document.getElementById("toast");
  const r = document.getElementById("toast-reply");
  const s = document.getElementById("toast-status");
  const o = document.getElementById("toast-opts");
  clearTimeout(toastTimer);
  r.textContent = reply || "";
  r.style.display = reply ? "" : "none";
  s.textContent = status ? status.text : "";
  s.className = "status " + (status && status.ok ? "ok" : "bad");
  s.style.display = status ? "" : "none";
  o.innerHTML = "";
  if (options && options.length) {
    options.forEach(opt => {
      const b = document.createElement("button");
      b.className = "opt";
      b.textContent = opt;
      b.onclick = (e) => { e.stopPropagation(); answerClarification(opt); };
      o.appendChild(b);
    });
  }
  toast.style.display = (reply || status || (options && options.length)) ? "block" : "none";
  /* Auto-hide: 5s normally, 10s for errors. Clarification questions stay
     until answered or dismissed. */
  if (!(options && options.length)) {
    const ms = (status && !status.ok) ? 10000 : 5000;
    toastTimer = setTimeout(hideToast, ms);
  }
}
function hideToast() {
  clearTimeout(toastTimer);
  pendingText = null;
  document.getElementById("toast").style.display = "none";
}
document.getElementById("toast").addEventListener("click", hideToast);

function answerClarification(option) {
  const original = pendingText;
  pendingText = null;
  hideToast();
  if (original) submitEntry(original + " (clarification: " + option + ")");
}

async function handleSend() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;
  input.value = "";
  submitEntry(text);
}

async function submitEntry(text) {
  sendBtn.disabled = true; sendBtn.textContent = "…";
  try {
    const key = localStorage.getItem(LS_KEY);
    const result = key ? await parseWithClaude(text, key) : parseOffline(text);

    /* Claude may ask a clarifying question (size / type / quantity). */
    if (result.question && result.question.text && Array.isArray(result.question.options) && result.question.options.length) {
      pendingText = text;
      showToast(result.question.text, null, result.question.options.slice(0, 4));
      return;
    }

    const applied = applyUpdates(result.updates || []);
    if (applied) {
      const bytes = saveDiary();
      showToast(result.reply, {ok:true, text:"Saved & read-back verified at "+fmtTime(new Date())+" ("+bytes.toLocaleString()+" bytes)."});
      if (result.updates[0] && result.updates[0].date) selected = result.updates[0].date;
    } else {
      showToast(result.reply || "Nothing to log from that.", null);
    }
    render();
  } catch(e) {
    showToast(null, {ok:false, text:"Couldn't log that: "+e.message});
  } finally {
    sendBtn.disabled = false; sendBtn.textContent = "Log";
  }
}

function applyUpdates(updates) {
  let touched = false;
  for (const u of updates) {
    const date = u.date || todayISO();
    const entry = ensureDay(date);
    if (Array.isArray(u.removeIndexes) && u.removeIndexes.length) {
      const drop = new Set(u.removeIndexes);
      entry.meals = entry.meals.filter((_,i)=>!drop.has(i));
      touched = true;
    }
    if (Array.isArray(u.removeExerciseIndexes) && u.removeExerciseIndexes.length) {
      const dropE = new Set(u.removeExerciseIndexes);
      entry.exercise = entry.exercise.filter((_,i)=>!dropE.has(i));
      touched = true;
    }
    if (Array.isArray(u.addMeals)) for (const m of u.addMeals) {
      if (m && typeof m.name==="string" && typeof m.kcal==="number") {
        const meal = { name: m.name, kcal: Math.round(m.kcal) };
        if (m.note) meal.note = m.note;
        entry.meals.push(meal); touched = true;
      }
    }
    if (Array.isArray(u.addExercise)) for (const m of u.addExercise) {
      if (m && typeof m.name==="string" && typeof m.kcal==="number") {
        const ex = { name: m.name, kcal: Math.abs(Math.round(m.kcal)) };
        if (m.note) ex.note = m.note;
        entry.exercise.push(ex); touched = true;
      }
    }
    if (typeof u.weightKg==="number") { entry.weightKg = u.weightKg; touched = true; }
    if (typeof u.bodyFatPct==="number") { entry.bodyFatPct = u.bodyFatPct; touched = true; }
  }
  return touched;
}

/* Offline fallback: "name = kcal", "weight 72.5", "bf 18" */
function parseOffline(text) {
  const t = text.trim();
  let m = t.match(/^weight\s+([\d.]+)/i);
  if (m) return { updates:[{date:todayISO(), weightKg:parseFloat(m[1])}], reply:"Weight logged: "+m[1]+" kg." };
  m = t.match(/^(?:bf|body\s*fat)\s+([\d.]+)/i);
  if (m) return { updates:[{date:todayISO(), bodyFatPct:parseFloat(m[1])}], reply:"Body fat logged: "+m[1]+"%." };
  m = t.match(/^(.+?)\s*=\s*-\s*(\d+)\s*$/);
  if (m) return { updates:[{date:todayISO(), addExercise:[{name:m[1].trim(), kcal:parseInt(m[2],10)}]}], reply:"Exercise logged: "+m[1].trim()+" — "+m[2]+" kcal burned." };
  m = t.match(/^(.+?)\s*=\s*(\d+)\s*$/);
  if (m) return { updates:[{date:todayISO(), addMeals:[{name:m[1].trim(), kcal:parseInt(m[2],10)}]}], reply:"Logged "+m[1].trim()+" — "+m[2]+" kcal." };
  return { updates: [], reply: "No API key set, so I can only parse: food name = 350, exercise name = -300, weight 72.5, or bf 18. Add a key in the Data tab for natural-language logging." };
}

async function parseWithClaude(userText, apiKey) {
  const prompt = `You are the meal-logging parser inside a calorie-tracking app called The Daily Ledger.
Today's date is ${todayISO()}.

Current diary (JSON). Meal indexes are the array positions shown:
${JSON.stringify(diary, null, 1)}

The user typed: "${userText}"

Interpret this as diary updates. Estimate calories realistically (typical restaurant/label values, sensible rounding). Resolve relative days like "yesterday" against today's date. If a calorie count is label-confirmed, use it exactly with note "Label-confirmed". For corrections/removals, use removeIndexes (meals) or removeExerciseIndexes (exercise) on the matching array index for that date. Weight is kg; body fat is %. If the message isn't loggable, return empty updates and answer briefly in "reply".

EXERCISE: if the user describes physical activity (a run, gym session, cycling, a long walk, sport, etc.), log it in addExercise with kcal = estimated calories BURNED (positive number). Estimate from activity, duration/distance, and intensity for a ~73 kg adult; if duration or intensity is missing and it changes the estimate meaningfully, ask a clarifying question instead. Exercise reduces the day's net calories in the app automatically — never log it as a negative meal.

IMPORTANT — clarifying questions: if the calorie estimate would swing meaningfully (roughly 75+ kcal) based on size, quantity, preparation, or type that the user did not specify (e.g. "an apricot" could be small/large/dried, "a latte" could be 8/12/16 oz or whole/skim/oat milk, "fries" could be small/medium/large), do NOT guess. Instead return empty updates and a "question" object with 2-4 short tappable options, each including its approximate kcal, e.g. {"text":"What kind of apricot?","options":["Fresh, small (~17 kcal)","Fresh, large (~35 kcal)","Dried, 5 pieces (~85 kcal)"]}. Ask at most ONE question per message and only when it genuinely matters — if the message says "(clarification: …)" it contains the answer, so log it without asking again. For trivial ambiguity, just use the typical value.

Respond with ONLY a JSON object, no markdown fences:
{"updates":[{"date":"YYYY-MM-DD","addMeals":[{"name":"string","kcal":0,"note":"optional"}],"addExercise":[{"name":"string","kcal":0,"note":"optional"}],"removeIndexes":[],"removeExerciseIndexes":[],"weightKg":null,"bodyFatPct":null}],"question":null,"reply":"short confirmation with kcal breakdown"}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (!res.ok) {
    const errBody = await res.text();
    let msg = "API error " + res.status;
    try { msg += ": " + (JSON.parse(errBody).error || {}).message; } catch(e){}
    throw new Error(msg);
  }
  const data = await res.json();
  const text = (data.content||[]).map(b=>b.type==="text"?b.text:"").filter(Boolean).join("\n");
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

/* ============================ boot ============================ */
document.getElementById("goal-label").textContent = getGoal().toLocaleString();
try {
  if (!Object.keys(diary).length) { ensureDay(todayISO()); selected = todayISO(); }
  if (!localStorage.getItem(LS_DIARY)) saveDiary(); // persist first run
} catch(e) {
  showToast(null,{ok:false,text:"WARNING: this browser blocked storage — data will NOT persist. "+e.message});
}
render();
</script>
